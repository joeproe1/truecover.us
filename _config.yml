# Site settings
title: True Cover
description: "Small commercial insurance brokerage for business owners. AI-powered policy analysis, straight answers, and coverage that fits. Less busywork, more attention on your account."
url: "https://truecover.us"
baseurl: ""
author: True Cover

# Contact info
email: hello@truecover.us
phone: "(717) 490-7670"

# Build settings
markdown: kramdown
permalink: /insights/:title/
future: true

# Plugins (all GitHub Pages whitelisted)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# SEO tag defaults
twitter:
  card: summary


# Feed settings
feed:
  path: /feed/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - CNAME
  - .gitignore

# Default front matter
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: "True Cover"

# Theme (none - custom styles only)
theme: null

# Sass
sass:
  style: compressed
  sass_dir: _sass
