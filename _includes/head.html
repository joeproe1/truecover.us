<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% seo %}
{% if page.noindex %}<meta name="robots" content="noindex, follow">{% endif %}

<!-- Favicon -->
<link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="icon" href="{{ '/assets/images/favicon-32.png' | relative_url }}" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- WebSite Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "True Cover",
  "url": "{{ site.url }}",
  "description": "{{ site.description }}",
  "publisher": { "@id": "{{ site.url }}/#organization" }
}
</script>

<!-- Site Identity Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": ["InsuranceAgency", "ProfessionalService"],
      "@id": "{{ site.url }}/#organization",
      "name": "True Cover",
      "url": "{{ site.url }}",
      "description": "Insurance brokerage for accounting firms, law firms, consultants, and financial advisors. Cyber, professional liability, D&O, and full commercial programs.",
      "foundingDate": "2026",
      "email": "{{ site.email }}",
      "identifier": {
        "@type": "PropertyValue",
        "propertyID": "NPN",
        "value": "22068604"
      },
      "parentOrganization": {
        "@type": "Organization",
        "name": "Breezy Risk Advisors LLC"
      },
      "founder": {
        "@type": "Person",
        "name": "Joerg Proeve",
        "jobTitle": "Independent Risk Advisor",
        "alumniOf": [
          { "@type": "CollegeOrUniversity", "name": "London Business School" }
        ],
        "knowsAbout": [
          "Insurance Policy Language Analysis",
          "Cyber Insurance",
          "Professional Liability Insurance",
          "Coverage Gap Analysis"
        ]
      },
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "sales",
        "email": "{{ site.email }}"
      },
      "areaServed": [
        { "@type": "State", "name": "Pennsylvania" },
        { "@type": "State", "name": "Florida" },
        { "@type": "State", "name": "New Jersey" }
      ],
      "serviceType": [
        "Cyber Liability Insurance",
        "Professional Liability Insurance",
        "Errors and Omissions Insurance",
        "Directors and Officers Insurance",
        "Commercial Insurance",
        "General Liability Insurance",
        "Business Owners Policy",
        "Workers Compensation Insurance",
        "Employment Practices Liability Insurance",
        "Umbrella and Excess Liability Insurance"
      ],
      "audience": [
        { "@type": "Audience", "audienceType": "Professional Services Firms" },
        { "@type": "Audience", "audienceType": "Accounting Firms" },
        { "@type": "Audience", "audienceType": "Law Firms" },
        { "@type": "Audience", "audienceType": "Consultants" },
        { "@type": "Audience", "audienceType": "Financial Advisors" },
        { "@type": "Audience", "audienceType": "Small Businesses" },
        { "@type": "Audience", "audienceType": "Midsized Businesses" }
      ],
      "knowsAbout": [
        "Insurance for Professional Services Firms",
        "Insurance for Accounting Firms",
        "Insurance for Law Firms",
        "Insurance for Consultants",
        "Insurance for Financial Advisors",
        "Cyber Insurance",
        "Professional Liability Insurance",
        "Errors and Omissions Insurance",
        "Accountants Professional Liability",
        "Legal Malpractice Insurance",
        "Directors and Officers Insurance",
        "Coverage Gap Analysis",
        "Insurance Policy Language Review",
        "Ransomware Coverage",
        "Business Insurance Programs"
      ]
    }
  ]
}
</script>
