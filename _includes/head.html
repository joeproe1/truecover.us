<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% seo %}
{% if page.noindex %}<meta name="robots" content="noindex, follow">{% endif %}

<!-- Favicon -->
<link rel="icon" href="{{ '/assets/images/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="icon" href="{{ '/assets/images/favicon-32.png' | relative_url }}" sizes="32x32" type="image/png">
<link rel="apple-touch-icon" href="{{ '/assets/images/apple-touch-icon.png' | relative_url }}">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">

<!-- Stylesheet -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- WebSite Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "True Cover",
  "url": "{{ site.url }}",
  "description": "{{ site.description }}",
  "publisher": { "@id": "{{ site.url }}/#organization" }
}
</script>

<!-- Site Identity Schema -->
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@graph": [
    {
      "@type": ["InsuranceAgency", "ProfessionalService"],
      "@id": "{{ site.url }}/#organization",
      "name": "True Cover",
      "url": "{{ site.url }}",
      "description": "Commercial insurance brokerage. Cyber, professional liability, Directors and Officers, and full commercial programs for small and midsized businesses.",
      "foundingDate": "2026",
      "telephone": "+1-717-490-7670",
      "email": "{{ site.email }}",
      "contactPoint": {
        "@type": "ContactPoint",
        "telephone": "+1-717-490-7670",
        "contactType": "sales",
        "email": "{{ site.email }}"
      },
      "areaServed": [
        { "@type": "State", "name": "Pennsylvania" },
        { "@type": "State", "name": "Florida" },
        { "@type": "State", "name": "New Jersey" }
      ],
      "serviceType": [
        "Cyber Liability Insurance",
        "Technology Errors and Omissions Insurance",
        "Directors and Officers Insurance",
        "Commercial Insurance",
        "Business Owners Policy",
        "General Liability Insurance",
        "Workers Compensation Insurance",
        "Employment Practices Liability Insurance",
        "Umbrella and Excess Liability Insurance"
      ],
      "audience": [
        { "@type": "Audience", "audienceType": "Small Businesses" },
        { "@type": "Audience", "audienceType": "Midsized Businesses" },
        { "@type": "Audience", "audienceType": "Professional Services Firms" },
        { "@type": "Audience", "audienceType": "Technology Companies" }
      ],
      "knowsAbout": [
        "Cyber Insurance for Technology Companies",
        "Technology Errors and Omissions Insurance",
        "Directors and Officers Insurance for Startups",
        "Commercial Insurance for Software Companies",
        "MSP Insurance",
        "FinTech Insurance",
        "Professional Liability for IT Services",
        "Ransomware Coverage",
        "Social Engineering Coverage",
        "Policy Language Analysis"
      ]
    }
  ]
}
</script>
