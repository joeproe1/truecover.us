<section class="cta-banner">
    <div class="container">
        <div class="cta-banner-inner">
            <h2>{{ include.title | default: "Ready to talk about your coverage?" }}</h2>
            {% if include.subtitle %}<p>{{ include.subtitle }}</p>{% endif %}
            <div class="btn-group" style="justify-content: center;">
                <a href="{{ '/contact/' | relative_url }}" class="btn btn-white">{{ include.button | default: "Get a Quote" }}</a>
            </div>
        </div>
    </div>
</section>
