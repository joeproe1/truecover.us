<!DOCTYPE html>
<html lang="en-US">
<head>
    {% include head.html %}
</head>
<body class="{{ page.body_class }}">
    {% include nav.html %}

    {% unless page.url == "/" %}
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://truecover.us/"
        }{% if page.layout == "post" %},
        {
          "@type": "ListItem",
          "position": 2,
          "name": "Insights",
          "item": "https://truecover.us/insights/"
        },
        {
          "@type": "ListItem",
          "position": 3,
          "name": {{ page.title | jsonify }}
        }{% else %},
        {
          "@type": "ListItem",
          "position": 2,
          "name": {{ page.title | jsonify }}
        }{% endif %}
      ]
    }
    </script>
    {% endunless %}

    <main class="site-main">
    {{ content }}
    </main>

    {% include footer.html %}

    <script src="{{ '/assets/js/nav.js' | relative_url }}"></script>
</body>
</html>
